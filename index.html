<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <!-- El título por defecto. Será reemplazado dinámicamente por React -->

    <!-- CDN de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->

    <!-- Babel para compilar JSX -->

    <style>
        /* Tipografía Premium */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Temas Duales Premium */
        .theme-dark {
            --bg-main: #0f0f11;
            --bg-card: #16161a;
            --bg-card-hover: #1e1e24;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-color: rgba(255,255,255,0.05);
        }

        .theme-light {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body.theme-dark { background-color: var(--bg-main); color: var(--text-main); }
        body.theme-light { background-color: var(--bg-main); color: var(--text-main); }

        /* Sombra de texto cinemática profunda para legibilidad absoluta contra fondos brillantes */
        .text-shadow-cinematic {
            text-shadow: 0 4px 20px rgba(0,0,0,0.98), 0 2px 8px rgba(0,0,0,0.95);
        }

        /* Scrollbar estético y ocultador */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #e50914; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Clases CSS personalizadas inyectadas en React */
        .premium-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:hover {
            background-color: var(--bg-card-hover);
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .theme-light .premium-card:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
    </style>
</head>

        const App = () => {
          const [movies, setMovies] = useState(BACKUP_MOVIES);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [slideProgress, setSlideProgress] = useState(0);
          const [themeMode, setThemeMode] = useState("dark");
          
          const [storeServices, setStoreServices] = useState(BACKUP_SERVICES);
          const [slideSpeed, setSlideSpeed] = useState(6000); 
          const [whatsappPhone, setWhatsappPhone] = useState(BACKUP_SOCIALS.whatsappPhone);
          const [paymentMethods, setPaymentMethods] = useState(BACKUP_PAYMENTS);
          const [socials, setSocials] = useState(BACKUP_SOCIALS);
          const [socialsArray, setSocialsArray] = useState(BACKUP_SOCIALS_ARRAY);

          const [logoType, setLogoType] = useState("text"); 
          const [logoText, setLogoText] = useState("FSNFLIX");
          const [logoUrl, setLogoUrl] = useState("");

          const [selectedCheckoutService, setSelectedCheckoutService] = useState(null);
          const [activeQrMethod, setActiveQrMethod] = useState(null);
          const [promoIndex, setPromoIndex] = useState(0);

          const progressInterval = useRef(null);
          const touchStartX = useRef(null);
          const touchEndX = useRef(null);

          // === SINCRONIZACIÓN AUTOMÁTICA EN VIVO Y ENLACE DE SEO ===
          useEffect(() => {
            const fetchAllData = async () => {
              const ts = new Date().getTime(); 

              try {
                const resMovies = await fetch(`${GITHUB_MOVIES_URL}?t=${ts}`);
                if (resMovies.ok) {
                  const dataMovies = await resMovies.json();
                  if (Array.isArray(dataMovies) && dataMovies.length > 0) setMovies(dataMovies);
                }
              } catch (e) { console.log("Usando valores por defecto (Catálogo)."); }

              try {
                const resStore = await fetch(`${GITHUB_STORE_URL}?t=${ts}`);
                if (resStore.ok) {
                  const data = await resStore.json();
                  if (data) {
                    if (data.globalSettings) {
                      if (data.globalSettings.slideSpeed) setSlideSpeed(data.globalSettings.slideSpeed);
                      if (data.globalSettings.whatsappPhone) setWhatsappPhone(data.globalSettings.whatsappPhone);
                      if (data.globalSettings.logoType) setLogoType(data.globalSettings.logoType);
                      if (data.globalSettings.logoText) setLogoText(data.globalSettings.logoText);
                      if (data.globalSettings.logoUrl) setLogoUrl(data.globalSettings.logoUrl);
                    }
                    if (Array.isArray(data.services) && data.services.length > 0) setStoreServices(data.services);
                    if (Array.isArray(data.paymentMethods) && data.paymentMethods.length > 0) setPaymentMethods(data.paymentMethods);
                    
                    if (data.socialsArray) {
                        setSocialsArray(data.socialsArray);
                    } else if (data.socials) {
                        const arr = [];
                        if (data.socials.facebook) arr.push({ id: 'soc-fb', platform: 'Facebook', url: data.socials.facebook });
                        if (data.socials.whatsappGroup) arr.push({ id: 'soc-wa', platform: 'WhatsApp', url: data.socials.whatsappGroup });
                        if (data.socials.tiktok) arr.push({ id: 'soc-tk', platform: 'TikTok', url: data.socials.tiktok });
                        setSocialsArray(arr);
                    }

                    if (data.metaTags) {
                        const meta = data.metaTags;
                        if (meta.title) document.title = meta.title;
                        const updateMeta = (name, content) => {
                            if (!content) return;
                            let el = document.querySelector(`meta[name="${name}"]`);
                            if (!el) { el = document.createElement('meta'); el.name = name; document.head.appendChild(el); }
                            el.content = content;
                        };
                        const updatePropertyMeta = (property, content) => {
                            if (!content) return;
                            let el = document.querySelector(`meta[property="${property}"]`);
                            if (!el) { el = document.createElement('meta'); el.setAttribute('property', property); document.head.appendChild(el); }
                            el.content = content;
                        };
                        updateMeta('description', meta.description);
                        updateMeta('keywords', meta.keywords);
                        updatePropertyMeta('og:title', meta.ogTitle || meta.title);
                        updatePropertyMeta('og:description', meta.description);
                        updatePropertyMeta('og:image', meta.ogImage);
                    }
                  }
                }
              } catch (e) { console.log("Usando valores por defecto (Tienda)."); }
            };
            fetchAllData();
          }, []);

          useEffect(() => {
            const promoInterval = setInterval(() => setPromoIndex(prev => (prev === 0 ? 1 : 0)), 4000); 
            return () => clearInterval(promoInterval);
          }, []);

          useEffect(() => {
            document.body.className = themeMode === "light" ? "theme-light overflow-x-hidden selection:bg-red-650 selection:text-white" : "theme-dark overflow-x-hidden selection:bg-red-650 selection:text-white";
          }, [themeMode]);

          const nextSlide = useCallback(() => {
            if (movies.length === 0) return;
            setCurrentIndex(prev => (prev === movies.length - 1 ? 0 : prev + 1));
            setSlideProgress(0);
          }, [movies.length]);

          const prevSlide = () => {
            if (movies.length === 0) return;
            setCurrentIndex(prev => (prev === 0 ? movies.length - 1 : prev - 1));
            setSlideProgress(0);
          };

          useEffect(() => {
            if (movies.length === 0 || activeQrMethod) return;
            const updateRate = 100;
            const step = (updateRate / slideSpeed) * 100;

            progressInterval.current = setInterval(() => {
              setSlideProgress(prev => {
                if (prev >= 100) { nextSlide(); return 0; }
                return prev + step;
              });
            }, updateRate);

            return () => { if (progressInterval.current) clearInterval(progressInterval.current); };
          }, [nextSlide, movies.length, slideSpeed, activeQrMethod]);

          const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
          const handleTouchMove = (e) => { touchEndX.current = e.touches[0].clientX; };
          const handleTouchEnd = () => {
            if (!touchStartX.current || !touchEndX.current) return;
            const diff = touchStartX.current - touchEndX.current;
            if (diff > 50) { nextSlide(); setSlideProgress(0); if (progressInterval.current) clearInterval(progressInterval.current); } 
            else if (diff < -50) { prevSlide(); setSlideProgress(0); if (progressInterval.current) clearInterval(progressInterval.current); }
            touchStartX.current = null; touchEndX.current = null;
          };

          const currentMovie = movies[currentIndex] || BACKUP_MOVIES[0];
          const activeTheme = PLATFORM_THEMES[currentMovie?.platform] || PLATFORM_THEMES["Netflix"];

          const getWaMessage = () => {
              if (!selectedCheckoutService) return "";
              const isAgotado = selectedCheckoutService.status === "Agotado" || selectedCheckoutService.badge?.toUpperCase() === "SIN STOCK";
              return isAgotado
                  ? encodeURIComponent(`¡Hola FSNFLIX! Veo que no hay disponibilidad de cuentas de *${selectedCheckoutService.name}* (${selectedCheckoutService.plan}). ¿Cuándo volverán a tener stock?`)

          return (
            <div className="min-h-screen relative transition-colors duration-500 flex flex-col justify-between">

                      <div className="w-full max-w-xl flex flex-col items-center justify-center h-full max-h-[85vh] py-4 text-center">

                          </div>

                          <div className="flex flex-row items-center justify-center gap-4 md:gap-8 w-full max-h-[45vh] md:max-h-[50vh] overflow-hidden flex-shrink py-2">
                              {activeQrMethod.qrs.map((qr, i) => {
                                  if(!qr) return null;
                                  return <img key={i} src={qr} alt={`QR ${activeQrMethod.name} ${i+1}`} referrerPolicy="no-referrer" className="max-h-full max-w-[42vw] md:max-w-[240px] h-auto object-contain rounded-2xl drop-shadow-[0_15px_30px_rgba(0,0,0,0.7)] border border-white/5" />;

                          </div>

                          <div className="w-full max-w-md px-4 mt-6 flex-shrink-0">
                              <a href={`https://wa.me/${whatsappPhone}?text=${getWaMessage()}`} target="_blank" rel="noopener noreferrer" className="w-full py-3.5 md:py-4 bg-[#25D366] hover:bg-[#20ba53] text-white font-black text-xs md:text-sm uppercase tracking-widest rounded-2xl transition-transform transform hover:-translate-y-0.5 shadow-xl shadow-emerald-500/20 flex items-center justify-center gap-2 active:scale-95">
                                  <svg className="h-5 w-5 fill-current text-white" viewBox="0 0 24 24"><path d="M12.005 0C5.378 0 .005 5.373.005 12.002c0 2.128.552 4.195 1.6 6.002L0 24l6.14-1.61c1.764.966 3.75 1.474 5.865 1.474 6.627 0 12-5.373 12-5.373 12-12.002S18.632 0 12.005 0zm0 21.84c-1.802 0-3.56-.484-5.11-1.402l-.367-.217-3.793.994.994-3.7-.238-.377a9.845 9.845 0 01-1.503-5.26c0-5.448 4.434-9.882 9.885-9.882 2.64 0 5.12 1.028 6.985 2.894 1.866 1.867 2.895 4.348 2.895 6.988 0 5.45-4.435 9.883-9.882 9.883zm5.418-7.397c-.297-.149-1.758-.867-2.03-.967-.272-.099-.47-.149-.668.149-.198.298-.767.967-.94 1.165-.173.198-.346.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.298-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.714.248-1.325.173-1.451-.074-.126-.272-.198-.57-.347z"/></svg> PAGAR Y CONTACTAR
                              </a>
                          </div>
                      </div>
                  </div>
              )}

              {/* NAVEGACIÓN SUPERIOR FIJA */}
              {!selectedCheckoutService && (
                <header className={`fixed top-0 left-0 w-full z-50 px-6 py-4 md:px-12 flex justify-between items-center transition-colors duration-500 backdrop-blur-md border-b ${themeMode === "light" ? "bg-white/80 border-slate-200 shadow-sm" : "bg-black/50 border-white/5"}`}>
                  <div className="flex items-center gap-8">
                    {logoType === "image" && logoUrl ? (
                      <img src={logoUrl} alt={logoText || "Logo FSNFLIX"} className="h-7 md:h-8 w-auto object-contain max-w-[160px] cursor-pointer hover:scale-105 transition-transform duration-300" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} onError={(e) => { e.target.style.display = 'none'; }} />

                      <span onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="text-red-655 font-black text-2xl md:text-3xl tracking-tighter cursor-pointer hover:scale-105 transition-transform duration-300 select-none">{logoText || "FSNFLIX"}</span>

                    </button>
                  </div>
                </header>
              )}

              {/* SLIDER SUPERIOR CINEMÁTICO (ALTURA AUMENTADA Y PROTECCIÓN DE HEADER) */}
              <section className={`${selectedCheckoutService ? 'fixed inset-0 z-0 h-screen' : 'relative w-full h-[70vh] min-h-[500px] md:h-[80vh] block overflow-hidden bg-black select-none'} transition-all duration-700`} onTouchStart={!selectedCheckoutService ? handleTouchStart : undefined} onTouchMove={!selectedCheckoutService ? handleTouchMove : undefined} onTouchEnd={!selectedCheckoutService ? handleTouchEnd : undefined}>
                {movies.map((movie, index) => {
                  const isCurrent = index === currentIndex;
                  return (
                    <div key={movie.id || index} className={`absolute inset-0 transition-opacity duration-[1200ms] ease-in-out ${isCurrent ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}>
                      <img src={movie.backdropUrl} alt={movie.title} referrerPolicy="no-referrer" className={`w-full h-full object-cover object-center transform transition-transform duration-[8000ms] ease-out ${isCurrent ? 'scale-105' : 'scale-100'}`} onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=1600&q=80"; }} />
                      <div className={`absolute inset-0 transition-colors duration-700 ${selectedCheckoutService ? 'bg-black/65 backdrop-blur-md' : (themeMode === "light" ? "bg-gradient-to-t from-slate-50 via-black/40 to-transparent" : "bg-gradient-to-t from-neutral-950 via-neutral-950/50 to-transparent")}`} />
                      {!selectedCheckoutService && <div className="absolute inset-0 bg-gradient-to-r from-black/90 via-black/20 to-transparent" />}
                    </div>
                  );
                })}

                {!selectedCheckoutService && movies.length > 0 && (
                  <>
                    <div className={`absolute bottom-0 left-0 w-2/3 h-2/3 rounded-full filter blur-[140px] opacity-20 pointer-events-none transition-all duration-1000 bg-gradient-to-br ${activeTheme.brandColor} z-10`} />

                    {/* ZONA SEGURA ANTI-OVERLAP (pt-[120px] protege el header fijo) */}
                    <div className="absolute inset-0 z-20 flex flex-col justify-end w-full max-w-7xl mx-auto px-6 md:px-12 pb-20 pt-[120px] text-white pointer-events-none">
                      <div className="max-w-4xl space-y-4 pointer-events-auto drop-shadow-xl overflow-hidden">
                        <PlatformLogo platform={currentMovie?.platform} sizeClass="h-8 md:h-12 drop-shadow-lg" shopCatalog={storeServices} />
                        {/* Texto responsivo adaptativo que no rompe la interfaz */}
                        <h1 className="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black uppercase tracking-tight leading-[1.05] text-white text-shadow-cinematic drop-shadow-2xl">
                          {currentMovie?.title}
                        </h1>
                      </div>
                    </div>

                    <div className="absolute bottom-0 left-0 w-full z-30 bg-gradient-to-t from-black/80 to-transparent pt-8 pb-4 px-6 md:px-12 pointer-events-none">
                      <div className="max-w-7xl mx-auto flex items-center justify-between gap-4 pointer-events-auto">
                          <div className="flex-1 max-w-sm flex flex-col gap-1.5 ml-auto">
                            <div className="w-full h-[3px] bg-neutral-800 rounded-full overflow-hidden">
                              <div className={`h-full ${activeTheme?.accentBg || 'bg-red-655'} transition-all ease-linear`} style={{ width: `${slideProgress}%` }} />
                            </div>
                            <div className="flex justify-end gap-1.5 pt-1">
                              {movies.map((_, idx) => (
                                <button key={idx} onClick={() => { setCurrentIndex(idx); setSlideProgress(0); }} className={`h-2 rounded-full transition-all duration-300 ${idx === currentIndex ? `${activeTheme?.accentBg || 'bg-red-655'} w-6` : "bg-neutral-600 w-2 hover:bg-neutral-500"}`} />
                              ))}
                            </div>
                          </div>
                      </div>
                    </div>
                  </>
                )}
              </section>

              {/* RENDERIZADO SPA PASO 2: VISTA DE CHECKOUT EN SEGUNDO PLANO */}
              {selectedCheckoutService ? (
                  <div className="relative z-10 py-10 px-6 md:px-12 animate-fade-in flex flex-col justify-center flex-1">
                      <div className="max-w-7xl mx-auto space-y-8 w-full">
                          
                          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-neutral-900/70 border border-white/5 backdrop-blur-md p-4 rounded-3xl shadow-xl w-full">
                              <button onClick={() => setSelectedCheckoutService(null)} className="flex items-center gap-2.5 text-xs font-black uppercase tracking-widest text-white transition-all bg-neutral-955/60 hover:bg-neutral-900/80 border border-neutral-700/50 px-5 py-3 rounded-2xl hover:-translate-x-1 active:scale-95 shrink-0">← Cancelar Pedido</button>
                              
                              <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 w-full sm:w-auto mt-2 sm:mt-0">
                                  <span className="text-xs font-black uppercase tracking-wider text-neutral-350 whitespace-nowrap">🔥 Únete a nuestra comunidad:</span>
                                  <div className="flex flex-wrap items-center gap-2 select-none w-full sm:w-auto justify-start sm:justify-end">
                                      {socialsArray.map(soc => {
                                          if (!soc.url) return null;
                                          const style = SocialIconConfig(soc.platform);
                                          return (
                                              <a key={soc.id} href={soc.url} target="_blank" rel="noopener noreferrer" className={`flex items-center justify-center gap-1.5 md:gap-2 text-white px-3 py-2 md:px-4 md:py-2.5 rounded-xl font-black uppercase text-[9px] md:text-[10px] tracking-widest transition-transform hover:scale-105 shadow-md active:scale-95 shrink-0 ${style.bg} ${style.ring}`}>
                                                  {style.svg} {soc.platform}
                                              </a>
                                          );
                                      })}
                                  </div>
                              </div>
                          </div>

                          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 md:gap-16 items-start">
                              <div className="lg:col-span-4">
                                  <div className="sticky top-24 space-y-6">
                                      <span className="text-red-500 font-black text-xs uppercase tracking-widest block drop-shadow-md">Suscripción Elegida</span>
                                      
                                      <div className="premium-card rounded-3xl p-6 md:p-8 flex flex-col relative overflow-hidden h-full bg-[#16161a]/90 backdrop-blur-xl border border-white/10 shadow-2xl" style={{ borderTopWidth: '5px', borderTopStyle: 'solid', borderTopColor: selectedCheckoutService.status === "Agotado" ? '#404040' : selectedCheckoutService.color }}>
                                          <div className="h-10 mb-5 flex items-center justify-start brand-logo-container">
                                              <PlatformLogo platform={selectedCheckoutService.name} sizeClass="h-8 md:h-10" shopCatalog={storeServices} isGrayscale={selectedCheckoutService.status === "Agotado"} />
                                          </div>
                                          <div className="text-[11px] uppercase font-bold tracking-widest mb-1 text-neutral-400">{selectedCheckoutService.plan}</div>
                                          <div className="flex items-baseline gap-1 mb-8">
                                              <span className="text-base font-bold text-neutral-400">S/</span>
                                              <span className="text-4xl md:text-5xl font-black tracking-tight text-white">{selectedCheckoutService.price}</span>
                                              <span className="text-xs font-medium text-neutral-400 ml-1">/ mes</span>
                                          </div>
                                          <ul className="space-y-3.5 mb-2">
                                              {getFeaturesList(selectedCheckoutService.features).map((feature, i) => (
                                                  <li key={i} className="flex items-start gap-3 text-sm font-medium opacity-90 text-white"><span className="text-lg leading-none mt-[-2px]" style={{ color: selectedCheckoutService.color }}>•</span><span className="leading-snug">{feature}</span></li>
                                              ))}
                                          </ul>
                                      </div>

                                      <a href={`https://wa.me/${whatsappPhone}?text=${getWaMessage()}`} target="_blank" rel="noopener noreferrer" className="w-full py-4 bg-[#25D366] hover:bg-[#20ba53] text-white font-black text-sm uppercase tracking-widest rounded-2xl transition-all shadow-xl shadow-emerald-500/20 text-center flex items-center justify-center gap-3 transform hover:-translate-y-1 active:scale-95">
                                          {SocialIconConfig('whatsapp').svg} Pagar y contactar
                                      </a>
                                  </div>
                              </div>

                              <div className="lg:col-span-8 space-y-8 animate-fade-in mt-6 lg:mt-0">
                                  <div className="space-y-1.5 text-center md:text-left drop-shadow-lg">
                                      <span className="text-red-500 font-black text-xs uppercase tracking-widest block">Pasarela Segura</span>

                                      <p className="text-sm text-neutral-300 font-medium">Haz clic en el logotipo de tu billetera o banco para visualizar el código QR de pago en pantalla completa.</p>

                                      {paymentMethods.map(method => {

                                          return (

                                                className="flex items-center justify-center p-3 sm:p-4 h-[75px] md:h-[90px] w-[45%] sm:w-auto shrink-0 bg-neutral-900/50 border border-white/10 hover:bg-neutral-800/80 rounded-2xl cursor-pointer transition-all hover:scale-105 shadow-xl backdrop-blur-md"

                                                  <img

                                                      alt={method.name}

                                                  />

                                  </div>

              ) : (
                  /* VISTA PRINCIPAL (INDEX) */
                  <div className="flex-1 flex flex-col justify-between">
                      {/* AUTO-SLIDER PROMOCIONAL REDUCIDO Y FLUIDO */}
                      <section className={`py-6 px-6 md:px-12 border-b transition-colors duration-500 relative overflow-hidden h-[150px] shrink-0 ${themeMode === "light" ? "bg-white border-slate-200" : "bg-neutral-900/20 border-white/5"}`}>
                        
                        <div className={`absolute inset-0 flex flex-col items-center justify-center w-full px-4 transition-opacity duration-1000 ${promoIndex === 0 ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>

                                  <div className="text-[11px] uppercase font-bold tracking-widest mb-1 text-[var(--text-muted)]">{service.plan}</div>
                                  <div className="flex items-baseline gap-1 mb-8"><span className="text-base font-bold text-[var(--text-muted)]">S/</span><span className="text-4xl md:text-5xl font-black tracking-tight text-[var(--text-main)]">{service.price}</span><span className="text-xs font-medium text-[var(--text-muted)] ml-1">/ mes</span></div>
                                  <ul className="space-y-3.5 flex-grow mb-8">
                                    {featuresList.map((feature, i) => (
                                      <li key={i} className="flex items-start gap-3 text-sm font-medium opacity-90 text-[var(--text-main)]"><span className="text-lg leading-none mt-[-2px]" style={{ color: isAgotado ? '#606060' : service.color }}>•</span><span className="leading-snug">{feature}</span></li>
                                    ))}
                                  </ul>
                                  <button onClick={() => { setSelectedCheckoutService(service); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="w-full py-4 rounded-xl font-black text-sm uppercase transition-all hover:brightness-110 shadow-lg text-center block active:scale-95" style={{ backgroundColor: isAgotado ? '#2e2e33' : service.color, color: isAgotado ? '#8a8a93' : (service.btnText || '#ffffff'), border: isAgotado ? '1px solid #43434d' : 'none' }}>
                                    {isAgotado ? "Consultar Stock ⚡" : "Adquirir Cuenta"}
                                  </button>
                                </div>
                              );
                            })}
                        </div>
                      </section>
                  </div>
              )}

              {/* FOOTER */}
              <footer className="py-12 border-t shrink-0" style={{ borderColor: 'var(--border-color)' }}>
                <div className="text-center text-sm font-medium opacity-60 text-[var(--text-main)]">
                  <p>© {new Date().getFullYear()} {logoText || "FSNFLIX"} - Portal de Streaming Premium de Alta Fidelidad.</p>
                </div>
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
