<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>FSNFLIX | Tu Portal de Streaming Premium</title>
    <!-- CDN de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel para compilar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Tipografía Premium basada en tu diseño original */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Temas Duales Premium */
        .theme-dark {
            --bg-main: #0f0f11;
            --bg-card: #16161a;
            --bg-card-hover: #1e1e24;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-color: rgba(255,255,255,0.05);
        }

        .theme-light {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body.theme-dark { background-color: var(--bg-main); color: var(--text-main); }
        body.theme-light { background-color: var(--bg-main); color: var(--text-main); }

        /* Sombra de texto cinemática profunda para legibilidad absoluta contra fondos brillantes */
        .text-shadow-cinematic {
            text-shadow: 0 4px 20px rgba(0,0,0,0.98), 0 2px 8px rgba(0,0,0,0.95);
        }

        /* Scrollbar estético y ocultador */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #e50914; }

        /* Ocultador de scrollbar lateral */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Clases CSS personalizadas inyectadas en React */
        .premium-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:hover {
            background-color: var(--bg-card-hover);
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .theme-light .premium-card:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body class="theme-dark overflow-x-hidden selection:bg-red-650 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ENDPOINTS DIRECTOS EN GITHUB SIN CACHÉ
        const GITHUB_MOVIES_URL = "https://raw.githubusercontent.com/DRAKENVOLK/FNSFLIX/main/peliculas.json";
        const GITHUB_STORE_URL = "https://raw.githubusercontent.com/DRAKENVOLK/FNSFLIX/main/tienda_config.json";
        const WHATSAPP_PHONE = "51986193615";

        // ================= DATOS DE RESPALDO OFFLINE (FALLBACK) =================
        const BACKUP_MOVIES = [
          {
            id: "st-5", title: "Stranger Things 5", platform: "Netflix", type: "Serie de TV",
            overview: "La temporada final donde el grupo se enfrenta al enigma definitivo del Upside Down para salvar a Hawkins de una vez por todas.",
            rating: 8.9, releaseYear: "2026", duration: "Temporada Final", genres: ["Ciencia Ficción", "Drama"],
            backdropUrl: "https://image.tmdb.org/t/p/w1280/56v2dnL56CNm6CHgmqXfw88llm6.jpg"
          }
        ];

        const BACKUP_SERVICES = [
            { id: 'netflix', name: 'Netflix', color: '#E50914', plan: 'Plan Premium 4K', price: '24.90', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg', features: 'Calidad 4K HDR\nPerfiles estables con PIN\nEvasión de bloqueo de hogar', btnText: '#ffffff', status: 'Disponible' }
        ];

        // MÉTODOS DE PAGO DEFINITIVOS CON LOGOS Y QRS SOLICITADOS
        const PAYMENT_METHODS = [
            { 
                id: 'binance', 
                name: 'Binance', 
                logo: 'https://i.imgur.com/k0FBADb.png', 
                qrs: ['https://i.imgur.com/j6JGfiL.png'],
                instructions: 'Abre Binance Pay y escanea el código QR oficial de pago.'
            },
            { 
                id: 'prexpe', 
                name: 'Prexpe', 
                logo: 'https://i.imgur.com/hYH6MS2.png', 
                qrs: ['https://i.imgur.com/zPVSWGu.png'],
                instructions: 'Transfiere de inmediato escaneando nuestro código QR de Prex.'
            },
            { 
                id: 'yape', 
                name: 'Yape', 
                logo: 'https://i.imgur.com/xmJIlY1.png', 
                qrs: ['https://i.imgur.com/BJM8hDH.png', 'https://i.imgur.com/eihEzag.png'],
                instructions: 'Escanea cualquiera de nuestros códigos QR de Yape desde tu celular.'
            },
            { 
                id: 'plin', 
                name: 'Plin', 
                logo: 'https://i.imgur.com/39r84Q8.png', 
                qrs: ['https://i.imgur.com/BJM8hDH.png', 'https://i.imgur.com/eihEzag.png'],
                instructions: 'Escanea el QR interoperable para transferir directamente a nuestro Plin.'
            }
        ];

        const PLATFORM_THEMES = {
          "Netflix": { brandColor: "from-red-600 to-red-800", textColor: "text-red-500", borderActive: "border-red-650", badgeBg: "bg-red-950/70 text-red-300 border-red-900/50" },
          "Disney+": { brandColor: "from-cyan-500 to-blue-600", textColor: "text-cyan-400", borderActive: "border-cyan-500", badgeBg: "bg-cyan-950/70 text-cyan-300 border-cyan-900/50" },
          "Crunchyroll": { brandColor: "from-amber-500 to-orange-600", textColor: "text-amber-500", borderActive: "border-amber-500", badgeBg: "bg-amber-950/70 text-amber-300 border-amber-800" },
          "Max": { brandColor: "from-indigo-600 to-purple-800", textColor: "text-indigo-400", borderActive: "border-indigo-600", badgeBg: "bg-indigo-950/70 text-indigo-300 border-indigo-900/50" },
          "Prime Video": { brandColor: "from-sky-400 to-blue-500", textColor: "text-sky-400", borderActive: "border-sky-500", badgeBg: "bg-sky-950/70 text-sky-300 border-sky-900/50" },
          "Apple TV+": { brandColor: "from-neutral-400 to-neutral-600", textColor: "text-neutral-400", borderActive: "border-neutral-400", badgeBg: "bg-neutral-900/70 text-neutral-350 border-neutral-700/50" },
          "ViX Premium": { brandColor: "from-orange-500 to-orange-700", textColor: "text-orange-500", borderActive: "border-orange-600", badgeBg: "bg-orange-950/70 text-orange-300 border-orange-900/50" },
          "Magis TV": { brandColor: "from-yellow-500 to-yellow-700", textColor: "text-yellow-500", borderActive: "border-yellow-500", badgeBg: "bg-yellow-950/70 text-yellow-300 border-yellow-900/50" }
        };

        // Función robusta para parsear las listas de beneficios de la tienda previniendo errores de "split is not a function"
        const getFeaturesList = (features) => {
            if (!features) return [];
            if (Array.isArray(features)) return features;
            if (typeof features === 'string') return features.split('\n').map(f => f.trim()).filter(Boolean);
            return [];
        };

        // ================= COMPONENTE LOGO DE PLATAFORMA (FLOTANTE TRANSPARENTE CON DROPSHADOW) =================
        const PlatformLogo = ({ platform, sizeClass = "h-8 md:h-11", shopCatalog = [], isGrayscale = false }) => {
            const activeService = shopCatalog?.find(s => s.name.toLowerCase() === platform?.toLowerCase());
            
            const defaultLogos = {
                "netflix": "https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg",
                "spotify": "https://upload.wikimedia.org/wikipedia/commons/2/26/Spotify_logo_with_text.svg",
                "max": "https://upload.wikimedia.org/wikipedia/commons/c/ce/Max_logo.svg",
                "disney+": "https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg",
                "prime video": "https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png",
                "crunchyroll": "https://upload.wikimedia.org/wikipedia/commons/0/0e/Crunchyroll_Logo_and_Text.svg",
                "paramount+": "https://upload.wikimedia.org/wikipedia/commons/a/a5/Paramount_Plus.svg",
                "youtube": "https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg",
                "apple tv+": "https://upload.wikimedia.org/wikipedia/commons/a/ab/Apple_TV_Plus_logo.svg",
                "vix premium": "https://www.hollywoodreporter.com/wp-content/uploads/2024/01/ViX_logo-1-H-2024.jpg",
                "canva pro": "https://edudigital.pro/wp-content/uploads/2024/03/CANVAPRO.png",
                "magis tv": "https://magisstvapp.com/wp-content/uploads/2026/03/cropped-magiss-tv-app-logo-02-01.png"
            };
            
            const platKey = platform?.toLowerCase();
            const url = activeService?.logoUrl || defaultLogos[platKey];
            const invertInLight = ["disney+", "spotify", "paramount+", "apple tv+", "vix premium"].includes(platKey);

            if (url) {
                return (
                    <img 
                        src={url} 
                        alt={platform} 
                        referrerPolicy="no-referrer" 
                        className={`${sizeClass} w-auto object-contain filter drop-shadow-[0_4px_12px_rgba(0,0,0,0.85)] ${invertInLight ? 'logo-adaptive' : ''} ${isGrayscale ? 'grayscale opacity-40' : ''}`} 
                    />
                );
            }
            return <span className={`font-black uppercase tracking-wider ${sizeClass} text-white drop-shadow-[0_4px_12px_rgba(0,0,0,0.85)] flex items-center`}>{platform}</span>;
        };

        const App = () => {
          const [movies, setMovies] = useState(BACKUP_MOVIES);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [slideProgress, setSlideProgress] = useState(0);
          const [isTransitioning, setIsTransitioning] = useState(false);
          const [themeMode, setThemeMode] = useState("dark");
          
          // ESTADOS DE TIENDA Y VELOCIDAD GLOBALES SINCRO GITHUB
          const [storeServices, setStoreServices] = useState(BACKUP_SERVICES);
          const [slideSpeed, setSlideSpeed] = useState(6000); 

          // ESTADOS PARA FLUJO DE COMPRA SPA PASO 2 Y MODAL QR A PANTALLA COMPLETA
          const [selectedCheckoutService, setSelectedCheckoutService] = useState(null);
          const [activeQrMethod, setActiveQrMethod] = useState(null);
          
          // ESTADO PARA EL BANNER DE PROMOCIÓN DEBAJO DEL SLIDER
          const [promoIndex, setPromoIndex] = useState(0);

          const progressInterval = useRef(null);
          const touchStartX = useRef(null);
          const touchEndX = useRef(null);

          // === DOBLE SINCRONIZACIÓN AUTOMÁTICA DESDE GITHUB ===
          useEffect(() => {
            const fetchAllData = async () => {
              const timestamp = new Date().getTime();

              try {
                const resMovies = await fetch(`${GITHUB_MOVIES_URL}?t=${timestamp}`);
                if (resMovies.ok) {
                  const dataMovies = await resMovies.json();
                  if (Array.isArray(dataMovies) && dataMovies.length > 0) {
                    setMovies(dataMovies);
                  }
                }
              } catch (e) {
                console.log("Error de conexión con peliculas.json.");
              }

              try {
                const resStore = await fetch(`${GITHUB_STORE_URL}?t=${timestamp}`);
                if (resStore.ok) {
                  const dataStore = await resStore.json();
                  if (dataStore) {
                    if (dataStore.globalSettings && dataStore.globalSettings.slideSpeed) {
                      setSlideSpeed(dataStore.globalSettings.slideSpeed);
                    }
                    if (Array.isArray(dataStore.services) && dataStore.services.length > 0) {
                      setStoreServices(dataStore.services);
                    }
                  }
                }
              } catch (e) {
                console.log("Error de conexión con tienda_config.json.");
              }
            };
            fetchAllData();
          }, []);

          // Alternador Automático del Banner de Promoción (Pagos / Comunidad)
          useEffect(() => {
            const promoInterval = setInterval(() => {
              setPromoIndex(prev => (prev === 0 ? 1 : 0));
            }, 4000); // Cambia cada 4 segundos
            return () => clearInterval(promoInterval);
          }, []);

          useEffect(() => {
            const body = document.body;
            if (themeMode === "light") {
              body.className = "theme-light overflow-x-hidden selection:bg-red-650 selection:text-white";
            } else {
              body.className = "theme-dark overflow-x-hidden selection:bg-red-650 selection:text-white";
            }
          }, [themeMode]);

          const nextSlide = useCallback(() => {
            if (movies.length === 0) return;
            setIsTransitioning(true);
            setTimeout(() => {
              setCurrentIndex(prev => (prev === movies.length - 1 ? 0 : prev + 1));
              setSlideProgress(0);
              setIsTransitioning(false);
            }, 300);
          }, [movies.length]);

          const prevSlide = () => {
            if (movies.length === 0) return;
            setIsTransitioning(true);
            setTimeout(() => {
              setCurrentIndex(prev => (prev === 0 ? movies.length - 1 : prev - 1));
              setSlideProgress(0);
              setIsTransitioning(false);
            }, 300);
          };

          // === TEMPORIZADOR ALINEADO A LA CONFIGURACIÓN DE GITHUB ===
          useEffect(() => {
            if (movies.length === 0 || activeQrMethod) return;
            const updateRate = 100;
            const step = (updateRate / slideSpeed) * 100;

            progressInterval.current = setInterval(() => {
              setSlideProgress(prev => {
                if (prev >= 100) {
                  nextSlide();
                  return 0;
                }
                return prev + step;
              });
            }, updateRate);

            return () => {
              if (progressInterval.current) clearInterval(progressInterval.current);
            };
          }, [nextSlide, movies.length, slideSpeed, activeQrMethod]);

          const resetAutoplay = () => {
            setSlideProgress(0);
            if (progressInterval.current) {
              clearInterval(progressInterval.current);
            }
          };

          const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
          const handleTouchMove = (e) => { touchEndX.current = e.touches[0].clientX; };
          const handleTouchEnd = () => {
            if (!touchStartX.current || !touchEndX.current) return;
            const diff = touchStartX.current - touchEndX.current;
            if (diff > 50) { nextSlide(); resetAutoplay(); } 
            else if (diff < -50) { prevSlide(); resetAutoplay(); }
            touchStartX.current = null;
            touchEndX.current = null;
          };

          const currentMovie = movies[currentIndex] || DEFAULT_MOVIES[0];
          const activeTheme = PLATFORM_THEMES[currentMovie?.platform] || { brandColor: "from-neutral-600 to-neutral-800", accentBg: "bg-neutral-600", borderActive: "border-neutral-600" };

          // MENSAJE DE WHATSAPP DINÁMICO
          const getWaMessage = () => {
              if (!selectedCheckoutService) return "";
              const isAgotado = selectedCheckoutService.status === "Agotado" || selectedCheckoutService.badge?.toUpperCase() === "SIN STOCK";
              return isAgotado
                  ? encodeURIComponent(`¡Hola FSNFLIX! Veo que no hay disponibilidad de cuentas de *${selectedCheckoutService.name}* (${selectedCheckoutService.plan}). ¿Cuándo volverán a tener stock?`)
                  : encodeURIComponent(`¡Hola FSNFLIX! Deseo adquirir el plan *${selectedCheckoutService.plan}* de *${selectedCheckoutService.name}*. Adjunto mi comprobante de pago para la activación inmediata.`);
          };

          return (
            <div className="min-h-screen relative transition-colors duration-500">
              
              {/* MODAL DEL CÓDIGO QR EN PANTALLA COMPLETA (LIGHTBOX TOTALMENTE AJUSTADO A 1 SOLA PÁGINA) */}
              {activeQrMethod && (
                  <div className="fixed inset-0 z-[200] flex flex-col items-center justify-center p-4 bg-black/95 backdrop-blur-2xl animate-fade-in overflow-hidden h-screen w-screen">
                      
                      {/* Botón Cerrar (X) */}
                      <button 
                          onClick={() => setActiveQrMethod(null)}
                          className="absolute top-4 right-4 text-white hover:text-red-500 transition-colors bg-neutral-900/50 rounded-full p-2 z-50 active:scale-95"
                      >
                          <svg className="w-6 h-6 md:w-8 md:h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                              <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                          </svg>
                      </button>

                      <div className="w-full max-w-xl flex flex-col items-center justify-center h-full max-h-full py-4 text-center">
                          
                          {/* Título del QR (Muy compacto para móvil) */}
                          <div className="space-y-1 mb-4 flex-shrink-0">
                              <h3 className="text-xl md:text-2xl font-black text-white uppercase tracking-wider">Escanea y Paga</h3>
                              <p className="text-neutral-400 text-xs md:text-sm max-w-sm mx-auto px-4">{activeQrMethod.instructions}</p>
                          </div>

                          {/* QRs Libres y Expandidos (Se escalan dinámicamente según la pantalla para entrar siempre enteros) */}
                          <div className="flex flex-row items-center justify-center gap-4 md:gap-8 w-full max-h-[45vh] md:max-h-[50vh] overflow-hidden flex-shrink py-2">
                              {activeQrMethod.qrs.map((qr, i) => (
                                  <img 
                                      key={i}
                                      src={qr} 
                                      alt={`QR ${activeQrMethod.name} ${i+1}`}
                                      referrerPolicy="no-referrer"
                                      className="max-h-full max-w-[42vw] md:max-w-[240px] h-auto object-contain rounded-2xl drop-shadow-[0_15px_30px_rgba(0,0,0,0.7)] border border-white/5"
                                  />
                              ))}
                          </div>

                          {/* ÚNICO Botón Verde Oficial de WhatsApp (SIN PRECIO, SOLO CONTACTO, MAESTRO Y TOTALMENTE VISIBLE) */}
                          <div className="w-full max-w-md px-4 mt-4 flex-shrink-0">
                              <a 
                                  href={`https://wa.me/${WHATSAPP_PHONE}?text=${getWaMessage()}`}
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  className="w-full py-3.5 md:py-4 bg-[#25D366] hover:bg-[#20ba53] text-white font-black text-xs md:text-sm uppercase tracking-widest rounded-2xl transition-transform transform hover:-translate-y-0.5 shadow-xl shadow-emerald-500/20 flex items-center justify-center gap-2 active:scale-95"
                              >
                                  <svg className="h-5 w-5 fill-current text-white" viewBox="0 0 24 24">
                                      <path d="M12.005 0C5.378 0 .005 5.373.005 12.002c0 2.128.552 4.195 1.6 6.002L0 24l6.14-1.61c1.764.966 3.75 1.474 5.865 1.474 6.627 0 12-5.373 12-12.002S18.632 0 12.005 0zm0 21.84c-1.802 0-3.56-.484-5.11-1.402l-.367-.217-3.793.994.994-3.7-.238-.377a9.845 9.845 0 01-1.503-5.26c0-5.448 4.434-9.882 9.885-9.882 2.64 0 5.12 1.028 6.985 2.894 1.866 1.867 2.895 4.348 2.895 6.988 0 5.45-4.435 9.883-9.882 9.883zm5.418-7.397c-.297-.149-1.758-.867-2.03-.967-.272-.099-.47-.149-.668.149-.198.298-.767.967-.94 1.165-.173.198-.346.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.298-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.714.248-1.325.173-1.451-.074-.126-.272-.198-.57-.347z"/>
                                  </svg>
                                  PAGAR Y CONTACTAR AL WHATSAPP
                              </a>
                          </div>

                      </div>
                  </div>
              )}

              {/* NAVEGACIÓN SUPERIOR FIJA */}
              {!selectedCheckoutService && (
                <header className={`fixed top-0 left-0 w-full z-50 px-6 py-4 md:px-12 flex justify-between items-center transition-colors duration-500 backdrop-blur-md border-b ${
                  themeMode === "light" 
                    ? "bg-white/80 border-slate-200 shadow-sm" 
                    : "bg-black/50 border-white/5"
                }`}>
                  <div className="flex items-center gap-8">
                    <span className="text-red-655 font-black text-3xl tracking-tighter cursor-pointer hover:scale-105 transition-transform duration-300">
                      FSNFLIX
                    </span>
                    <nav className={`hidden md:flex items-center gap-6 text-sm font-bold uppercase tracking-wider ${
                      themeMode === "light" ? "text-neutral-500" : "text-neutral-300"
                    }`}>
                      <span className={`transition-colors cursor-pointer ${themeMode === "light" ? "text-neutral-900 hover:text-red-655" : "text-white hover:text-red-500"}`} onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>Estrenos</span>
                      <span className={`transition-colors cursor-pointer ${themeMode === "light" ? "text-neutral-900 hover:text-red-655" : "text-white hover:text-red-500"}`} onClick={() => document.getElementById("tienda-section")?.scrollIntoView({ behavior: 'smooth' })}>Tienda Oficial</span>
                    </nav>
                  </div>
                  
                  <div className="flex items-center gap-4">
                    <button
                      onClick={() => setThemeMode(themeMode === "light" ? "dark" : "light")}
                      className={`p-2.5 rounded-full border transition-all ${
                        themeMode === "light" 
                          ? "border-neutral-300 text-neutral-600 hover:text-black hover:border-black bg-white/50" 
                          : "border-neutral-600 text-neutral-300 hover:text-white hover:border-white bg-black/40"
                      }`}
                      title="Alternar Tema"
                    >
                      {themeMode === "light" ? (
                        <svg className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                      ) : (
                        <svg className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.364l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                      )}
                    </button>
                  </div>
                </header>
              )}

              {/* SLIDER SUPERIOR CINEMÁTICO (SE ADAPTA AL CHECKOUT PARA SER FONDO VISIBLE E INMERSIVO CONTINUO) */}
              <section 
                className={`${
                    selectedCheckoutService 
                    ? 'fixed inset-0 z-0 h-screen'

                              >
                                  <svg className="h-4.5 w-4.5 fill-current text-white" viewBox="0 0 24 24">
                                      <path d="M12.005 0C5.378 0 .005 5.373.005 12.002c0 2.128.552 4.195 1.6 6.002L0 24l6.14-1.61c1.764.966 3.75 1.474 5.865 1.474 6.627 0 12-5.373 12-12.002S18.632 0 12.005 0zm0 21.84c-1.802 0-3.56-.484-5.11-1.402l-.367-.217-3.793.994.994-3.7-.238-.377a9.845 9.845 0 01-1.503-5.26c0-5.448 4.434-9.882 9.885-9.882 2.64 0 5.12 1.028 6.985 2.894 1.866 1.867 2.895 4.348 2.895 6.988 0 5.45-4.435 9.883-9.882 9.883zm5.418-7.397c-.297-.149-1.758-.867-2.03-.967-.272-.099-.47-.149-.668.149-.198.298-.767.967-.94 1.165-.173.198-.346.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.298-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.714.248-1.325.173-1.451-.074-.126-.272-.198-.57-.347z"/>
                                  </svg>
                                  WhatsApp
                              </a>

                              {/* Botón TikTok (NUEVO - Color Vibrante Oficial con Sombra Dual) */}
                              <a 
                                  href="https://www.tiktok.com/@fusionflix2.1?_r=1&_t=ZS-97DD8LHaJzc" 
                                  target="_blank" rel="noopener noreferrer"
                                  className="flex items-center justify-center gap-2.5 bg-[#010101] hover:bg-[#111] border border-neutral-800 text-white px-5 py-3 sm:px-8 sm:py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] sm:text-xs shrink-0 transition-transform hover:scale-105 shadow-xl shadow-black/40 ring-1 ring-[#FE2C55]/30"
                              >
                                  <svg className="h-4.5 w-4.5 fill-current text-white" viewBox="0 0 24 24">
                                      <path d="M12.53.02C13.84 0 15.14.01 16.44 0c.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.17-2.81-.74-3.94-1.69-.22-.19-.42-.38-.62-.59v7.02c.02 4.39-3.18 8.41-7.61 9.07-4.58.74-9.22-2.1-10.45-6.55C-1.57 12.92.83 7.8 5.2 6.13c1.23-.47 2.57-.59 3.86-.34v4.18c-1.34-.33-2.82-.09-3.95.74-.95.69-1.48 1.83-1.48 3.01.01 2.21 2 4.02 4.21 3.99 2.25-.03 4.02-1.92 3.99-4.17V0c.23.02.47.02.7.02z" />
                                  </svg>
                                  TikTok
                              </a>
                            </div>
                        </div>

                        {/* Indicadores de posición (Puntos de auto-slider) */}
                        <div className="absolute bottom-4 w-full flex justify-center gap-1.5">
                          {[0, 1].map((idx) => (
                            <button key={idx} onClick={() => setPromoIndex(idx)} className={`h-1.5 rounded-full transition-all duration-300 ${idx === promoIndex ? "bg-[var(--text-muted)] w-4" : "bg-[var(--border-color)] w-1.5"}`} />
                          ))}
                        </div>
                      </section>

                      {/* SECCIÓN: TIENDA OFICIAL (DISEÑO INTEGRAL Y RÉPLICA COMPLETA) */}
                      <section id="tienda-section" className="py-20 px-6 md:px-12">
                        <div className="max-w-[1400px] mx-auto">
                          
                          {/* GRID DE PRODUCTOS RÉPLICA STREAMHUB */}
                          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {storeServices.map((service) => {
                              const featuresList = getFeaturesList(service.features);
                              const isAgotado = service.status === "Agotado" || service.badge?.toUpperCase() === "SIN STOCK";
                              
                              return (
                                <div 
                                  key={service.id} 
                                  className={`premium-card rounded-3xl p-6 md:p-8 flex flex-col relative overflow-hidden h-full ${
                                    themeMode === "light" 
                                      ? "bg-white border border-slate-200/80 shadow-lg shadow-slate-100" 
                                      : "bg-[#16161a] border-transparent"
                                  } ${isAgotado ? 'opacity-80' : ''}`}
                                  style={{ borderTopWidth: '5px', borderTopStyle: 'solid', borderTopColor: isAgotado ? '#404040' : service.color }}
                                >
                                  {(service.badge || isAgotado) && (
                                    <div className={`absolute top-4 right-4 z-20 text-[9px] font-black uppercase px-2.5 py-1.5 rounded-md tracking-wider shadow-md ${
                                      isAgotado 
                                        ? "bg-neutral-800 border border-neutral-700 text-neutral-400" 
                                        : (service.badge?.toUpperCase() === "OFERTA" 
                                            ? "bg-gradient-to-r from-red-655 to-orange-500 text-white animate-pulse" 
                                            : "bg-gradient-to-r from-blue-500 to-indigo-600 text-white")
                                    }`}>
                                      {isAgotado ? "SIN STOCK" : service.badge}
                                    </div>
                                  )}

                                  <div className="h-10 mb-5 flex items-center justify-start brand-logo-container">
                                    <PlatformLogo platform={service.name} sizeClass="h-8 md:h-10" shopCatalog={storeServices} isGrayscale={isAgotado} />
                                  </div>

                                  <div className="text-[11px] uppercase font-bold tracking-widest mb-1 text-[var(--text-muted)]">
                                    {service.plan}
                                  </div>

                                  <div className="flex items-baseline gap-1 mb-8">
                                    <span className="text-base font-bold text-[var(--text-muted)]">S/</span>
                                    <span className="text-4xl md:text-5xl font-black tracking-tight text-[var(--text-main)]">{service.price}</span>
                                    <span className="text-xs font-medium text-[var(--text-muted)] ml-1">/ mes</span>
                                  </div>

                                  <ul className="space-y-3.5 flex-grow mb-8">
                                    {featuresList.map((feature, i) => (
                                      <li key={i} className="flex items-start gap-3 text-sm font-medium opacity-90 text-[var(--text-main)]">
                                        <span className="text-lg leading-none mt-[-2px]" style={{ color: isAgotado ? '#606060' : service.color }}>•</span>
                                        <span className="leading-snug">{feature}</span>
                                      </li>
                                    ))}
                                  </ul>

                                  {/* Botón de compra conectado al Checkout View Paso 2 */}
                                  <button 
                                    onClick={() => {
                                      setSelectedCheckoutService(service);
                                      window.scrollTo({ top: 0, behavior: 'smooth' });
                                    }}
                                    className="w-full py-4 rounded-xl font-black text-sm uppercase transition-all hover:brightness-110 shadow-lg text-center block active:scale-95"
                                    style={{ 
                                      backgroundColor: isAgotado ? '#2e2e33' : service.color, 
                                      color: isAgotado ? '#8a8a93' : (service.btnText || '#ffffff'),
                                      border: isAgotado ? '1px solid #43434d' : 'none'
                                    }}
                                  >
                                    {isAgotado ? "Consultar Stock ⚡" : "Adquirir Cuenta"}
                                  </button>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </section>
                  </>
              )}

              {/* FOOTER */}
              <footer className="py-12 border-t" style={{ borderColor: 'var(--border-color)' }}>
                <div className="text-center text-sm font-medium opacity-60 text-[var(--text-main)]">
                  <p>© {new Date().getFullYear()} FSNFLIX - Portal de Streaming Premium de Alta Fidelidad.</p>
                </div>
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
